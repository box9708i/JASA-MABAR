<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="center">
<div>

<h1>🎮 USER PANEL</h1>

<!-- STAT -->
<div class="card">
  <p>🟢 Online: <span id="onlineCount">0</span></p>
  <p>📦 Order: <span id="orderCount">0</span></p>
  <p>💰 Income: <span id="income">0</span></p>
</div>

<!-- JOKI -->
<div class="card">
  <select id="jokiSelect"></select>
  <img id="avatar" width="80">
  <h3 id="namaJoki"></h3>
  <p id="badge"></p>
  <p>⭐ <span id="rating"></span></p>
  <p>🟢 <span id="status"></span></p>
</div>

<!-- ORDER -->
<div class="card">
  <input id="idGame" class="input" placeholder="ID FF">

  <select id="rank">
    <option>Bronze</option>
    <option>Silver</option>
    <option>Gold</option>
    <option>Platinum</option>
    <option>Diamond</option>
    <option>Master</option>
    <option>Heroic</option>
  </select>

  <label><input type="checkbox" id="vip"> VIP</label>

  <p>Harga: <span id="harga"></span></p>

  <select id="payment">
    <option>Dana</option>
    <option>Gopay</option>
  </select>

  <p id="noPembayaran"></p>

  <button onclick="kirimOrder()" class="btn primary">ORDER</button>
  <button onclick="kirimWA()" class="btn">WA Admin</button>
</div>

<!-- CHAT -->
<div class="card">
  <div id="chatBox" class="chat-box"></div>
  <p id="typingStatus"></p>

  <input id="chatInput" class="input">
  <input type="file" id="imgInput">

  <button onclick="kirimChat()" class="btn primary">Kirim</button>

  <label><input type="checkbox" id="silentMode"> Silent</label>
</div>

<div id="notif" class="notif"></div>
<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
